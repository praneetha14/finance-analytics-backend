spring:
  application:
    name: finance-analytics
  datasource:
    username: ${MYSQL_DATABASE_USER:root}
    password: ${MYSQL_DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_DATABASE_HOST:localhost:3306}/${MYSQL_DATABASE_NAME:finance_analytics}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  profiles:
    active: local
